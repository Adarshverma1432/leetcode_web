const data = {

    sum: {
        title: "Sum of Multiples",
        desc: `
Given an integer n, return the sum of all numbers from 1 to n 
that are divisible by 3, 5, or 7.

Example:
Input: n = 10
Output: 40

Approach:
Loop from 1 to n and check:
i % 3 == 0 || i % 5 == 0 || i % 7 == 0
        `,
        code: `class Solution {
    public int sumOfMultiples(int n) {

        int sum = 0;

        for (int i = 1; i <= n; i++) {

            if (i % 3 == 0 || i % 5 == 0 || i % 7 == 0) {
                sum += i;
            }

        }

        return sum;
    }
}`
    },
    

    palindrome: {
        title: "Palindrome Number",
        desc: `
Given an integer x, return true if it is a palindrome.

Example:
121 → true
123 → false

Approach:
Reverse the number and compare with original.
        `,
        code: `class Solution {
    public boolean isPalindrome(int x) {
        if (x < 0) return false;

        int rev = 0, temp = x;

        while (temp != 0) {
            rev = rev * 10 + temp % 10;
            temp /= 10;
        }

        return rev == x;
    }
}`
    },"avg-salary": {
title: "Average Salary Excluding Minimum and Maximum Salary",
desc: `
Problem:
Given an array of salaries, return the average excluding the minimum and maximum salary.

Approach:
1. Find min and max salary.
2. Calculate total sum.
3. Subtract min and max from sum.
4. Divide by (n - 2).
`,
code: `class Solution {
    public double average(int[] salary) {
        int min = Integer.MAX_VALUE, max = Integer.MIN_VALUE, sum = 0;

        for(int s : salary){
            min = Math.min(min, s);
            max = Math.max(max, s);
            sum += s;
        }

        return (sum - min - max) * 1.0 / (salary.length - 2);
    }
}`
},

"kth-largest": {
title: "Kth Largest Element in an Array",
desc: `
Problem:
Find the kth largest element in an array.

Approach:
Use a min heap (PriorityQueue):
1. Add elements to heap.
2. Keep size = k.
3. Remove smallest when size > k.
4. Top element is kth largest.
`,
code: `import java.util.*;
class Solution {
    public int findKthLargest(int[] nums, int k) {
        PriorityQueue<Integer> pq = new PriorityQueue<>();

        for(int n : nums){
            pq.add(n);
            if(pq.size() > k) pq.poll();
        }

        return pq.peek();
    }
}
--------------------------------------------------------------------------
class Solution {
    public int findKthLargest(int[] nums, int k) {
        Arrays.sort(nums);
        return nums[nums.length-k];
    }
}`
},

"max-count": {
title: "Maximum Count of Positive and Negative",
desc: `
Problem:
Count positive and negative numbers and return the maximum.

Approach:
Loop through array:
- count positives
- count negatives
Return max of both.
`,
code: `class Solution {
    public int maximumCount(int[] nums) {
        int pcount=0;
        int ncount=0;
        for(int i=0;i<nums.length;i++){
            if(0<nums[i]){
                pcount++;
            }
            else if(0>nums[i]){
                ncount++;
            }
        }
        if(pcount>ncount){
            return pcount;
        }
     return ncount;
    }
}`
},

"target-indices": {
title: "Find Target Indices After Sorting Array",
desc: `
Problem:
Return indices of target after sorting.

Approach:
1. Sort array
2. Traverse and store indices where element == target
`,
code: `import java.util.*;
class Solution {
    public List<Integer> targetIndices(int[] nums, int target) {
        Arrays.sort(nums);
        List<Integer> res = new ArrayList<>();

        for(int i = 0; i < nums.length; i++){
            if(nums[i] == target) res.add(i);
        }

        return res;
    }
}`
},

"single-element": {
title: "Single Element in Sorted Array",
desc: `
Problem:
Every element appears twice except one. Find it.

Approach:
Binary Search:
- Pair index even-odd check
- Move left or right accordingly
`,
code: `class Solution {
    public int singleNonDuplicate(int[] nums) {
        int l = 0, r = nums.length - 1;

        while(l < r){
            int mid = (l + r) / 2;

            if(mid % 2 == 1) mid--;

            if(nums[mid] == nums[mid + 1]) l = mid + 2;
            else r = mid;
        }

        return nums[l];
    }
}`
},

"subarray-product": {
title: "Subarray Product Less Than K",
desc: `
Problem:
Count subarrays where product < k.

Approach:
Sliding Window:
- Expand right
- Shrink left if product >= k
- Count valid subarrays
`,
code: `class Solution {
    public int numSubarrayProductLessThanK(int[] nums, int k) {
        if(k <= 1) return 0;

        int prod = 1, left = 0, count = 0;

        for(int right = 0; right < nums.length; right++){
            prod *= nums[right];

            while(prod >= k){
                prod /= nums[left++];
            }

            count += right - left + 1;
        }

        return count;
    }
}`
},

"squares": {
title: "Squares of a Sorted Array",
desc: `
Problem:
Return sorted squares of array.

Approach:
Two pointers:
- Compare absolute values
- Fill result from end
`,
code: `class Solution {
    public int[] sortedSquares(int[] nums) {
        int n = nums.length;
        int[] res = new int[n];

        int l = 0, r = n - 1, i = n - 1;

        while(l <= r){
            if(Math.abs(nums[l]) > Math.abs(nums[r])){
                res[i--] = nums[l] * nums[l];
                l++;
            } else {
                res[i--] = nums[r] * nums[r];
                r--;
            }
        }

        return res;
    }
}`
},

"missing-number": {
title: "Missing Number",
desc: `
Problem:
Find missing number from 0 to n.

Approach:
Use sum formula:
n*(n+1)/2 - actual sum
`,
code: `class Solution {
    public int missingNumber(int[] nums) {
        int n = nums.length;
        int sum = n * (n + 1) / 2;

        for(int num : nums) sum -= num;

        return sum;
    }
}`
},
"remove-element": {
title: "Remove Element",
desc: `
Problem:
Given an array nums and a value val, remove all occurrences of val in-place.

Example:
nums = [3,2,2,3], val = 3 → Output = 2

Approach:
Use two pointers:
- Traverse array
- Copy only non-val elements forward
- Return new length
`,
code: `class Solution {
    public int removeElement(int[] nums, int val) {
        int k = 0;
        for(int i=0;i<nums.length;i++){
            if(nums[i]!=val){
                nums[k++] = nums[i];
            }
        }
        return k;
    }
}`
},

"count-negative": {
title: "Count Negative Numbers in a Sorted Matrix",
desc: `
Problem:
Count total negative numbers in a sorted matrix.

Example:
[[4,3,-1], [3,-1,-2]] → Output: 3

Approach:
Brute force:
- Traverse every element
- Count negatives
(Optimized: binary search per row)
`,
code: `class Solution {
    public int countNegatives(int[][] grid) {
        int count=0;
        for(int[] row:grid){
            for(int n:row){
                if(n<0) count++;
            }
        }
        return count;
    }
}`
},

"good-pairs": {
title: "Number of Good Pairs",
desc: `
Problem:
Find number of pairs (i, j) where i < j and nums[i] == nums[j].

Example:
[1,2,3,1,1,3] → Output: 4

Approach:
- Compare each pair
- Count when equal
(Optimized: use hashmap frequency)
`,
code: `class Solution {
    public int numIdenticalPairs(int[] nums) {
        int count=0;
        for(int i=0;i<nums.length;i++){
            for(int j=i+1;j<nums.length;j++){
                if(nums[i]==nums[j]) count++;
            }
        }
        return count;
    }
}`
},

"contains-duplicate": {
title: "Contains Duplicate",
desc: `
Problem:
Check if any element appears more than once.

Example:
[1,2,3,1] → true

Approach:
- Use HashSet
- If element already exists → duplicate
`,
code: `import java.util.*;
class Solution {
    public boolean containsDuplicate(int[] nums) {
        Set<Integer> set=new HashSet<>();
        for(int n:nums){
            if(!set.add(n)) return true;
        }
        return false;
    }
}`
},

"pairs-less-target": {
title: "Count Pairs Less Than Target",
desc: `
Problem:
Count pairs where sum < target.

Example:
[1,2,3], target=4 → Output: 2

Approach:
- Sort array
- Use two pointers
- Count valid pairs efficiently
`,
code: `import java.util.*;
class Solution {
    public int countPairs(int[] nums,int target){
        Arrays.sort(nums);
        int l=0,r=nums.length-1,count=0;
        while(l<r){
            if(nums[l]+nums[r]<target){
                count+=(r-l);
                l++;
            }else r--;
        }
        return count;
    }
}`
},

"divide": {
title: "Divide Two Integers",
desc: `
Problem:
Divide two integers without using *, /, %.

Approach:
- Use bit shifting
- Subtract multiples of divisor
- Handle sign separately
`,
code: `class Solution {
    public int divide(int a,int b){
        long x=Math.abs((long)a),y=Math.abs((long)b);
        int res=0;
        while(x>=y){
            long t=y,m=1;
            while(x>=(t<<1)){
                t<<=1;
                m<<=1;
            }
            x-=t;
            res+=m;
        }
        return ((a>0)==(b>0))?res:-res;
    }
}`
},

"smallest-even": {
title: "Smallest Even Multiple",
desc: `
Problem:
Find smallest number divisible by both n and 2.

Approach:
- If n even → answer = n
- Else → answer = 2*n
`,
code: `class Solution {
    public int smallestEvenMultiple(int n) {
        return n%2==0?n:2*n;
    }
}`
},

"reverse-string": {
title: "Reverse String",
desc: `
Problem:
Reverse a character array.

Approach:
- Use two pointers
- Swap from start and end
`,
code: `class Solution {
    public void reverseString(char[] s) {
        int l=0,r=s.length-1;
        while(l<r){
            char t=s[l];
            s[l]=s[r];
            s[r]=t;
            l++;r--;
        }
    }
}`
},

"rotated-search": {
title: "Search in Rotated Sorted Array",
desc: `
Problem:
Search target in rotated sorted array.

Approach:
- Use modified binary search
- Check sorted half each time
`,
code: `class Solution {
    public int search(int[] nums,int target){
        int l=0,r=nums.length-1;
        while(l<=r){
            int m=(l+r)/2;
            if(nums[m]==target) return m;
            if(nums[l]<=nums[m]){
                if(target>=nums[l]&&target<nums[m]) r=m-1;
                else l=m+1;
            }else{
                if(target>nums[m]&&target<=nums[r]) l=m+1;
                else r=m-1;
            }
        }
        return -1;
    }
}`
},

"count-odd": {
title: "Count Odd Numbers in an Interval Range",
desc: `
Problem:
Count odd numbers between low and high.

Approach:
Use math formula:
(high+1)/2 - low/2
`,
code: `class Solution {
    public int countOdds(int low,int high){
        return (high+1)/2 - low/2;
    }
}`
},"intersection-of-two-arrays": {
    title: "Intersection of Two Arrays",
    desc: `
Problem:
Given two integer arrays nums1 and nums2, return their intersection.
Each element in the result must be unique.

Approach:
Use HashSet.
1. Store nums1 elements in a set
2. Check nums2 elements in set
3. Store common elements in result set
4. Convert set to array
`,
    code: `class Solution {
    public int[] intersection(int[] nums1, int[] nums2) {
        HashSet<Integer> set = new HashSet<>();
        HashSet<Integer> res = new HashSet<>();

        for (int n : nums1) {
            set.add(n);
        }

        for (int m : nums2) {
            if (set.contains(m)) {
                res.add(m);
            }
        }

        int[] arr = new int[res.size()];
        int i = 0;

        for (int r : res) {
            arr[i++] = r;
        }

        return arr;
    }
}`
},
    "find-the-difference-of-two-arrays": {
    title: "Find the Difference of Two Arrays",
    desc: `
Problem:
Given two integer arrays nums1 and nums2, return a list of two lists:
- elements present in nums1 but not in nums2
- elements present in nums2 but not in nums1

Approach:
Use HashSet.
1. Store both arrays in sets
2. Compare elements
3. Add unique elements to separate lists
`,
    code: `class Solution {
    public List<List<Integer>> findDifference(int[] nums1, int[] nums2) {
        HashSet<Integer> set1 = new HashSet<>();
        HashSet<Integer> set2 = new HashSet<>();

        for (int n : nums1) set1.add(n);
        for (int n : nums2) set2.add(n);

        List<Integer> list1 = new ArrayList<>();
        List<Integer> list2 = new ArrayList<>();

        for (int n : set1) {
            if (!set2.contains(n)) {
                list1.add(n);
            }
        }

        for (int n : set2) {
            if (!set1.contains(n)) {
                list2.add(n);
            }
        }

        List<List<Integer>> ans = new ArrayList<>();
        ans.add(list1);
        ans.add(list2);

        return ans;
    }
}`
},
    "minimum-common-value": {
    title: "Minimum Common Value",
    desc: `
Problem:
Given two sorted arrays, return the smallest common element.
If no common element exists, return -1.

Approach:
Use Two Pointer technique.
1. Compare elements of both arrays
2. Move pointer of smaller element
3. If equal, return answer
`,
    code: `class Solution {
    public int getCommon(int[] nums1, int[] nums2) {
        int i = 0, j = 0;

        while (i < nums1.length && j < nums2.length) {
            if (nums1[i] == nums2[j]) {
                return nums1[i];
            }

            if (nums1[i] < nums2[j]) {
                i++;
            } else {
                j++;
            }
        }

        return -1;
    }
}`
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - CodeJourney</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 80px;
}

.logo {
    font-size: 22px;
    font-weight: 700;
    color: #38bdf8;
}

.nav-links a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
    opacity: 0.8;
}

/* HERO */
.hero {
    text-align: center;
    padding: 10px 20px;
}

.hero h1 {
    font-size: 40px;
    color: #38bdf8;
}

.hero p {
    max-width: 700px;
    margin: 15px auto;
    opacity: 0.9;
}

/* FORM */
.form-container {
    max-width: 600px;
    margin:auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #020617;
    color: white;
}

textarea {
    resize: none;
    height: 120px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #00f260, #0575e6);
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

/* FOOTER TEXT */
.note {
    text-align: center;
    margin-top: 20px;
    opacity: 0.7;
    font-size: 14px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">CodeJourney</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="index.html#ques">Problems</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Have a Question? 🤔</h1>
    <p>
        If you have any doubts, suggestions, or feedback, feel free to send us a message.
        We would love to hear from you!
    </p>
</div>

<!-- FORM -->
<!-- FORM -->
<div class="form-container">

    <form action="https://formsubmit.co/rajanverma30124@gmail.com" method="POST">

        <!-- Hidden settings -->
        <input type="hidden" name="_subject" value="New Message from CodeJourney">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Your Message</label>
            <textarea name="message" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit" class="btn">Send Message ✉️</button>

    </form>

</div>

</div>

<div class="note">
    We usually respond within 24 hours 🚀
</div>

</body>
</html>
